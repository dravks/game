<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isekai Prototype</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: #101820;
        color: #f4efe6;
        font-family: Arial, sans-serif;
      }

      #game-root {
        display: grid;
        height: 100%;
        place-items: center;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script src="./src/data/GameState.js"></script>
    <script src="./src/data/DungeonTemplates.js"></script>
    <script src="./src/data/MonsterBestiary.js"></script>
    <script src="./src/data/GameplayExtensions.js"></script>
    <script src="./src/data/GameplayPatchesV2.js"></script>
    <script src="./src/scenes/CharacterCreateScene.js"></script>
    <!-- UI Modules - load BEFORE scenes -->
    <script src="./src/ui/PanelManager.js"></script>
    <script src="./src/ui/InventoryPanel.js"></script>
    <script src="./src/ui/HotbarPanel.js"></script>
    <script src="./src/ui/CharacterPanel.js"></script>
    <script src="./src/ui/SkillPanel.js"></script>
    <script src="./src/ui/QuestPanel.js"></script>
    <script src="./src/scenes/prototype/NpcManager.js"></script>
    <script src="./src/scenes/prototype/InputManager.js"></script>
    <script src="./src/scenes/prototype/CityLayout.js"></script>
    <script src="./src/scenes/prototype/PlayerManager.js"></script>
    <script src="./src/scenes/prototype/QuestManager.js"></script>
    <script src="./src/scenes/prototype/ServiceManager.js"></script>
    <script src="./src/scenes/prototype/UIManager.js"></script>
    <script src="./src/scenes/PrototypeScene.js"></script>
    <script src="./src/scenes/OverworldScene.js"></script>
    <script src="./src/scenes/DungeonPrototypeScene.js"></script>
    <script src="./src/scenes/DungeonRuntimeExtensions.js"></script>
    <script src="./src/scenes/NpcSystemsPatchV2.js"></script>
    <script src="./src/scenes/DungeonGameplayPatchV2.js"></script>
    <script src="./src/main.js"></script>
  </body>
</html>
